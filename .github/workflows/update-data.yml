name: Update War Thunder Data

on:
  schedule:
    # Check for datamine updates every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force_update:
        description: "Force update even if no datamine changes"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Init datamine submodule (shallow)
        run: |
          git submodule init data/datamine
          git submodule update --depth 1 data/datamine

      - name: Check for datamine updates
        id: check
        run: |
          cd data/datamine
          CURRENT=$(git rev-parse HEAD)
          git fetch --depth 1 origin master
          LATEST=$(git rev-parse FETCH_HEAD)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$LATEST" ] || [ "${{ github.event.inputs.force_update }}" == "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Datamine updated: $CURRENT -> $LATEST"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No datamine changes detected"
          fi

      - name: Update datamine submodule
        if: steps.check.outputs.changed == 'true'
        run: |
          cd data/datamine
          git checkout FETCH_HEAD

      - name: Setup Python
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.check.outputs.changed == 'true'
        run: pip install -r data/scripts/requirements.txt

      - name: Fetch all vehicle data
        if: steps.check.outputs.changed == 'true'
        run: |
          cd data/scripts
          python fetch_all.py --no-images

      - name: Commit and push if changed
        id: commit
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/datamine public/data/
          if git diff --staged --quiet; then
            echo "pushed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: auto-update datamine data $(date +%Y-%m-%d)"
            git push
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger deploy
        if: steps.commit.outputs.pushed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
