name: Update War Thunder Data

on:
  schedule:
    # Check for datamine updates every hour
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force_update:
        description: "Force update even if no datamine changes"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Check for datamine updates
        id: check
        run: |
          cd data/datamine
          CURRENT=$(git rev-parse HEAD)
          git fetch origin
          LATEST=$(git rev-parse origin/master 2>/dev/null || git rev-parse origin/main)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$LATEST" ] || [ "${{ github.event.inputs.force_update }}" == "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Datamine updated: $CURRENT -> $LATEST"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No datamine changes detected"
          fi

      - name: Update datamine submodule
        if: steps.check.outputs.changed == 'true'
        run: |
          cd data/datamine
          git checkout $(git rev-parse origin/master 2>/dev/null || git rev-parse origin/main)

      - name: Setup Python
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.check.outputs.changed == 'true'
        run: pip install -r data/scripts/requirements.txt

      - name: Fetch ground vehicle data
        if: steps.check.outputs.changed == 'true'
        run: |
          cd data/scripts
          python fetch_datamine.py

      - name: Fetch aircraft data
        if: steps.check.outputs.changed == 'true'
        run: |
          cd data/scripts
          python fetch_aircraft.py --no-images

      - name: Fetch ship data
        if: steps.check.outputs.changed == 'true'
        run: |
          cd data/scripts
          python fetch_ships.py --no-images

      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/datamine public/data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update datamine data $(date +%Y-%m-%d)" && git push)
